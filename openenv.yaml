spec_version: 1

name: sql-code-review
version: "1.0.0"
description: >
  An OpenEnv environment that simulates real-world SQL code review tasks.
  An AI agent receives SQL snippets and must identify security vulnerabilities,
  performance bottlenecks, and correctness issues — then suggest fixes.
  Covers injection attacks, missing indices, N+1 queries, cartesian products,
  hardcoded credentials, and more.

type: environment
runtime: docker
app: app:app
port: 7860

domain: software-engineering
tags:
  - sql
  - code-review
  - security
  - performance
  - real-world
